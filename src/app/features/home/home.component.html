<div class="home-fold">
  <section class="hero">
    <img
      class="hero__img"
      ngSrc="/MineconIMG/header_img.jpeg"
      fill
      priority
      alt="MINECON — Maquinaria Pesada Industrial"
    />
    <img
      class="hero__logo"
      src="/MineconIMG/LogoCompanyName.svg"
      alt="MINECON"
    />
  </section>
  <app-infinitelogomarquee [items]="marqueeItems" />
</div>

<!-- Marcas Destacadas -->
<section class="brands-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Marcas Líderes" />
    </div>
  </div>
  <app-brandshowcase [items]="showcaseItems" />
</section>

<!-- Propuesta de Valor -->
<section class="feature-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Soluciones para cada Proyecto" />
    </div>
  </div>
  <app-feature-split [items]="featureItems" />
</section>

<!-- Divisiones de negocios -->
<section class="solutions-section">
  <app-slider [images]="solutionSlides" [intervalMs]="2500" />
</section>

<!-- Equipos Destacados -->
<section class="machinery-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Equipos Destacados" />
    </div>
  </div>

  <!-- Hero rotativo -->
  <div class="featured-hero" aria-live="polite" aria-atomic="true">
    <img
      class="featured-hero__img"
      [src]="activeEquip().image"
      [alt]="activeEquip().title"
      loading="eager"
    />
    <div class="featured-hero__overlay" aria-hidden="true"></div>
    <div class="featured-hero__content">
      <span class="featured-hero__brand">{{ activeEquip().brand }}</span>
      <h3 class="featured-hero__title">{{ activeEquip().title }}</h3>
      <a [routerLink]="activeEquip().route" class="featured-hero__link">
        Ver marca <span aria-hidden="true">→</span>
      </a>
    </div>
  </div>

  <!-- Miniaturas de selección -->
  <div class="featured-thumbs" role="group" aria-label="Seleccionar equipo">
    @for (equip of featuredMachinery; track equip.title; let i = $index) {
      <button
        class="featured-thumb"
        [class.featured-thumb--active]="activeEquipIndex() === i"
        (click)="activeEquipIndex.set(i)"
        [attr.aria-label]="equip.brand + ' — ' + equip.title"
        [attr.aria-pressed]="activeEquipIndex() === i"
      >
        <img class="featured-thumb__img" [src]="equip.image" alt="" aria-hidden="true" loading="lazy" />
        <div class="featured-thumb__overlay" aria-hidden="true"></div>
        <div class="featured-thumb__info">
          <span class="featured-thumb__brand">{{ equip.brand }}</span>
        </div>
      </button>
    }
  </div>
</section>

<!-- Divisor -->
<app-textcarouselslider [tickerTexts]="serviceTickerTexts" class="services-ticker" />

<!-- Servicios -->
<app-services-accordion />

<!-- Divisor -->
<app-textcarouselslider [tickerTexts]="serviceTickerTexts" class="services-ticker" />

<!-- CTA Final -->
<app-calltoaction
  title="¿Listo para cotizar o requiere asesoría?"
  description="Póngase en contacto con nuestros asesores para cotizar equipos, programar mantenimientos o consultar stock de repuestos originales."
  bgImageUrl="/VolvoConstructionEquipmentIMG/Volvo_Bauma_2019_04_07_586_96dpi_Web.jpg"
>
  <a routerLink="/contacto" class="mc-btn mc-btn--primary">
    <span class="mc-btn__label">Contactar Asesor</span>
  </a>
</app-calltoaction>
